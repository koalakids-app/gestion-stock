<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koala Kids — Documents</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--violet:#4A3F9F;--orange:#F47920;--orange-l:#FFF1E3;--violet-l:#EEECFA;--cream:#FDF8F2;--muted:#8E8AA8;--line:#EFE9F5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:#2B2740;min-height:100vh}
a{color:inherit}
.topbar{background:#fff;border-bottom:2px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.topbar h1{font-family:'Baloo 2',cursive;font-size:20px;color:var(--violet);flex:1}
.topbar .who{font-size:12px;color:var(--muted);font-weight:600}
.btn{border:none;border-radius:12px;padding:9px 14px;font-family:'Nunito';font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--orange);color:#fff}
.btn-s{background:var(--violet-l);color:var(--violet)}
.btn-g{background:#F1EFF7;color:var(--muted)}
.btn-d{background:#FDE8E8;color:#C62828}
.btn:disabled{opacity:.5;cursor:not-allowed}
.wrap{max-width:1000px;margin:0 auto;padding:16px}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
input,select,textarea{font-family:'Nunito';font-size:14px;padding:9px 11px;border:2px solid var(--line);border-radius:12px;background:#fff;color:#2B2740;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--orange)}
.search{flex:1;min-width:180px}
.cat{background:#fff;border:2px solid var(--line);border-radius:18px;margin-bottom:12px;overflow:hidden}
.cat-h{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.cat-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.cat-h h2{font-family:'Baloo 2',cursive;font-size:16px;flex:1;color:var(--violet)}
.cat-n{font-size:12px;font-weight:700;color:var(--muted);background:#F1EFF7;padding:3px 9px;border-radius:20px}
.cat-b{border-top:2px solid var(--line);padding:8px}
.doc{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:14px}
.doc:hover{background:#FAF8FD}
.doc-i{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.doc-i.dl{background:var(--violet-l);color:var(--violet)}
.doc-i.fill{background:var(--orange-l);color:var(--orange)}
.doc-t{flex:1;min-width:0}
.doc-t h3{font-size:14px;font-weight:700;line-height:1.25}
.doc-t p{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.3}
.doc-a{display:flex;gap:6px;flex-shrink:0}
.iconbtn{border:none;background:#F1EFF7;color:var(--muted);width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.iconbtn:hover{background:var(--violet-l);color:var(--violet)}
.iconbtn.d:hover{background:#FDE8E8;color:#C62828}
.tag{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;background:#F1EFF7;color:var(--muted);white-space:nowrap}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty i{font-size:42px;display:block;margin-bottom:10px;opacity:.4}
.ov{position:fixed;inset:0;background:rgba(43,39,64,.45);display:none;align-items:flex-start;justify-content:center;padding:20px;z-index:100;overflow-y:auto}
.ov.on{display:flex}
.modal{background:#fff;border-radius:20px;width:100%;max-width:560px;padding:20px;margin:auto}
.modal h2{font-family:'Baloo 2',cursive;font-size:19px;color:var(--violet);margin-bottom:14px}
.f{margin-bottom:12px}
.tpl h3{font-family:'Nunito';font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:#fff;background:var(--violet);padding:7px 12px;border-radius:10px;margin:18px 0 12px}
.tpl h3:first-child{margin-top:0}
.tpl .hint{font-size:12px;color:var(--muted);font-style:italic;margin:-6px 0 8px}
.tpl .grid2{display:flex;gap:10px;flex-wrap:wrap}
.tpl .grid2>.f{flex:1 1 200px}
.tpl textarea{min-height:90px;line-height:1.5}
.radios{display:flex;flex-wrap:wrap;gap:7px}
.radios label{display:flex;align-items:center;gap:5px;background:var(--violet-l);border-radius:20px;padding:7px 12px;font-size:12.5px;cursor:pointer}
.radios input{width:auto;accent-color:var(--orange)}
.sigbox{border:1px dashed var(--line);border-radius:12px;padding:10px;background:var(--cream);flex:1 1 240px}
.sigbox canvas{width:100%;height:120px;background:#fff;border-radius:8px;touch-action:none;display:block}
.sigbox .lbl{font-size:12px;font-weight:700;color:var(--violet);margin-bottom:6px}
.sigbox .acts{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.sigbox img{width:100%;height:120px;object-fit:contain;background:#fff;border-radius:8px}
.gev{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:14px}
.gev-hd{display:flex;background:var(--violet);color:#fff;font-size:10.5px;font-weight:700;text-align:center;position:sticky;top:0;z-index:2}
.gev-hd>div{padding:5px 3px}
.gev-it{display:flex;border-top:1px solid var(--line);align-items:stretch}
.gev-it:nth-child(even){background:var(--cream)}
.gev-lab{flex:1 1 auto;min-width:0;padding:7px 8px;font-size:12px;line-height:1.35;display:flex;align-items:center}
.gev-c{flex:0 0 34px;display:flex;align-items:center;justify-content:center;border-left:1px solid var(--line)}
.gev-c input{width:auto;margin:0;accent-color:var(--orange);transform:scale(1.15)}
.gev-a{flex:0 0 110px;border-left:1px solid var(--line);display:flex}
.gev-a input{width:100%;border:0;background:transparent;font-size:11.5px;padding:4px 6px}
.gev-a input:focus{outline:2px solid var(--orange);outline-offset:-2px;border-radius:6px}
.gev-sep{flex:0 0 5px;border-left:2px solid var(--violet)}
@media(max-width:720px){.gev-lab{font-size:11px}.gev-c{flex:0 0 27px}.gev-a{flex:0 0 78px}}
#qrBox{text-align:center;padding:10px}
#qrBox canvas,#qrBox img{margin:0 auto}
.qrwait{font-size:13px;color:var(--muted);margin-top:12px}
.f label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;background:#F1EFF7;border-radius:10px;padding:7px 10px;font-size:13px;margin-bottom:6px;width:100%}
.chip input{flex:1;border:none;background:transparent;padding:4px}
.chip select{width:auto;border:none;background:#fff;padding:4px 6px;font-size:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--violet);color:#fff;padding:11px 18px;border-radius:14px;font-size:13px;font-weight:600;z-index:200;display:none}
.toast.on{display:block}
.login{max-width:340px;margin:70px auto;background:#fff;border:2px solid var(--line);border-radius:22px;padding:26px}
.login h2{font-family:'Baloo 2',cursive;font-size:22px;color:var(--violet);text-align:center;margin-bottom:16px}
#fillArea .f input,#fillArea .f textarea,#fillArea .f select{background:#FAF8FD}
.rep{display:flex;align-items:center;gap:10px;padding:9px 11px;border:2px solid var(--line);border-radius:12px;margin-bottom:7px;font-size:13px}
.rep b{flex:1}
@media(max-width:600px){.wrap{padding:12px}.doc{flex-wrap:wrap}.doc-a{width:100%;justify-content:flex-end}}
</style>
</head>
<body>

<div id="loginView" style="display:none">
  <div class="login">
    <h2>Documents Koala Kids</h2>
    <div class="f"><label>Email</label><input type="email" id="liMail" autocomplete="username"></div>
    <div class="f"><label>Mot de passe</label><input type="password" id="liPwd" autocomplete="current-password"></div>
    <button class="btn btn-p" style="width:100%;justify-content:center" onclick="doLogin()">Se connecter</button>
    <p id="liErr" style="color:#C62828;font-size:12.5px;margin-top:10px;text-align:center"></p>
  </div>
</div>

<div id="appView" style="display:none">
  <div class="topbar">
    <a href="index.html" class="iconbtn"><i class="ti ti-arrow-left"></i></a>
    <h1>Documents</h1>
    <span class="who" id="whoAmI"></span>
    <button class="iconbtn" onclick="doLogout()" title="Déconnexion"><i class="ti ti-logout"></i></button>
  </div>

  <div class="wrap">
    <div class="bar">
      <input class="search" id="q" placeholder="Rechercher un document…" oninput="render()">
      <select id="fType" style="width:auto" onchange="render()">
        <option value="all">Tous types</option>
        <option value="remplissable">À remplir</option>
        <option value="telechargeable">À télécharger</option>
      </select>
      <select id="fCreche" style="width:auto" onchange="render()"></select>
      <button class="btn btn-p adminonly" onclick="openDoc()"><i class="ti ti-plus"></i> Document</button>
      <button class="btn btn-s adminonly" onclick="openCat()"><i class="ti ti-folder-plus"></i> Catégorie</button>
    </div>
    <div id="list"></div>
  </div>
</div>

<!-- Modal document -->
<div class="ov" id="ovDoc"><div class="modal">
  <h2 id="docTitle">Nouveau document</h2>
  <div class="f"><label>Titre</label><input id="dTitre"></div>
  <div class="f"><label>Description</label><input id="dDesc" placeholder="Optionnel"></div>
  <div class="f"><label>Catégorie</label><select id="dCat"></select></div>
  <div class="f"><label>Crèche</label><select id="dCreche"></select></div>
  <div class="f"><label>Type</label><select id="dType" onchange="toggleType()">
    <option value="telechargeable">À télécharger (fichier)</option>
    <option value="remplissable">À remplir en ligne</option>
  </select></div>
  <div class="f" id="fFile"><label>Fichier</label><input type="file" id="dFile"><p id="dFileCur" style="font-size:12px;color:var(--muted);margin-top:5px"></p></div>
  <div class="f" id="fSchema" style="display:none">
    <label>Champs du formulaire</label>
    <div id="champs"></div>
    <button class="btn btn-s" onclick="addChamp()"><i class="ti ti-plus"></i> Ajouter un champ</button>
  </div>
  <div class="mf">
    <button class="btn btn-g" onclick="close_('ovDoc')">Annuler</button>
    <button class="btn btn-p" id="dSave" onclick="saveDoc()">Enregistrer</button>
  </div>
</div></div>

<!-- Modal catégorie -->
<div class="ov" id="ovCat"><div class="modal" style="max-width:400px">
  <h2>Nouvelle catégorie</h2>
  <div class="f"><label>Nom</label><input id="cNom"></div>
  <div class="f"><label>Couleur</label><input type="color" id="cCoul" value="#4A3F9F" style="height:44px;padding:4px"></div>
  <div class="mf">
    <button class="btn btn-g" onclick="close_('ovCat')">Annuler</button>
    <button class="btn btn-p" onclick="saveCat()">Enregistrer</button>
  </div>
</div></div>

<!-- Modal remplissage -->
<div class="ov" id="ovFill"><div class="modal">
  <h2 id="fillTitle"></h2>
  <p id="fillState" style="font-size:12px;color:var(--muted);margin:-6px 0 12px"></p>
  <div id="fillArea"></div>
  <div class="mf">
    <button class="btn btn-g" onclick="close_('ovFill')">Fermer</button>
    <button class="btn btn-s" id="btnNewRep" onclick="openFill(fillDoc.id,null,true)"><i class="ti ti-plus"></i> Nouveau</button>
    <button class="btn btn-s" onclick="exportFillPdf()"><i class="ti ti-file-type-pdf"></i> PDF</button>
    <button class="btn btn-p" onclick="saveFill()"><i class="ti ti-device-floppy"></i> Enregistrer</button>
  </div>
</div></div>

<!-- Modal réponses -->
<div class="ov" id="ovReps"><div class="modal">
  <h2 id="repsTitle">Réponses enregistrées</h2>
  <div id="repsArea"></div>
  <div class="mf"><button class="btn btn-g" onclick="close_('ovReps')">Fermer</button></div>
</div></div>

<!-- Modal QR signature -->
<div class="ov" id="ovQr"><div class="modal" style="max-width:380px">
  <h2 id="qrTitle">Signature à distance</h2>
  <div id="qrBox"></div>
  <p class="qrwait" id="qrWait">En attente de la signature…</p>
  <div class="mf"><button class="btn btn-g" onclick="cancelQr()">Annuler</button></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL="https://juyrceadazrovlitxceb.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1eXJjZWFkYXpyb3ZsaXR4Y2ViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MjcyMDIsImV4cCI6MjA5NTQwMzIwMn0.yTEoRjhJFm3qj5oY2tLIcCXOWHHbU3rxWoIn47QKmug";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let ME=null,PROF=null,IS_ADMIN=false;
let CATS=[],DOCS=[],CRECHES=[];
let editDocId=null,fillDoc=null,fillRep=null;

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2600);}
function close_(id){document.getElementById(id).classList.remove('on');}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function slug(s){return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9.\-_]/g,'_');}

/* ---------- AUTH ---------- */
async function boot(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){document.getElementById('loginView').style.display='block';return;}
  ME=session.user;
  const{data:p}=await sb.from('referents').select('*').eq('user_id',ME.id).maybeSingle();
  PROF=p;
  IS_ADMIN=!!p&&(p.role==='direction'||p.role==='referent');
  document.getElementById('loginView').style.display='none';
  document.getElementById('appView').style.display='block';
  document.getElementById('whoAmI').textContent=p?(p.name||'')+(p.role==='direction'?' · Direction':''):'';
  document.querySelectorAll('.adminonly').forEach(e=>e.style.display=IS_ADMIN?'':'none');
  await loadAll();
}
async function doLogin(){
  const e=document.getElementById('liMail').value.trim(),p=document.getElementById('liPwd').value;
  const{error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error){document.getElementById('liErr').textContent='Identifiants incorrects';return;}
  location.reload();
}
async function doLogout(){await sb.auth.signOut();location.reload();}

/* ---------- LOAD ---------- */
async function loadAll(){
  const[c,d,cr]=await Promise.all([
    sb.from('doc_categories').select('*').order('ordre'),
    sb.from('documents_koala').select('*').eq('actif',true).order('titre'),
    sb.from('creches').select('id,name').order('name')
  ]);
  CATS=c.data||[];DOCS=d.data||[];CRECHES=cr.data||[];
  const sel=document.getElementById('fCreche');
  sel.innerHTML='<option value="all">Toutes les crèches</option>'+CRECHES.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('');
  if(PROF&&PROF.role==='referent'&&PROF.creche_id)sel.value=PROF.creche_id;
  render();
}

/* ---------- RENDER ---------- */
function render(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const ft=document.getElementById('fType').value;
  const fc=document.getElementById('fCreche').value;
  let docs=DOCS.filter(d=>{
    if(ft!=='all'&&d.type!==ft)return false;
    if(fc!=='all'&&d.creche_id&&d.creche_id!==fc)return false;
    if(q&&!((d.titre||'')+' '+(d.description||'')).toLowerCase().includes(q))return false;
    return true;
  });
  const el=document.getElementById('list');
  if(!docs.length){el.innerHTML='<div class="empty"><i class="ti ti-folder-off"></i>Aucun document</div>';return;}
  let html='';
  const groups=CATS.slice();
  groups.push({id:null,nom:'Sans catégorie',couleur:'#A8A29E'});
  groups.forEach(cat=>{
    const items=docs.filter(d=>(d.categorie_id||null)===(cat.id||null));
    if(!items.length)return;
    html+=`<div class="cat"><div class="cat-h" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
      <span class="cat-dot" style="background:${esc(cat.couleur||'#4A3F9F')}"></span>
      <h2>${esc(cat.nom)}</h2><span class="cat-n">${items.length}</span>
      <i class="ti ti-chevron-down" style="color:var(--muted)"></i></div><div class="cat-b">`;
    items.forEach(d=>{
      const fill=d.type==='remplissable';
      const crName=d.creche_id?(CRECHES.find(c=>c.id===d.creche_id)||{}).name:null;
      html+=`<div class="doc">
        <div class="doc-i ${fill?'fill':'dl'}"><i class="ti ti-${fill?'forms':'file-download'}"></i></div>
        <div class="doc-t"><h3>${esc(d.titre)}</h3>
          <p>${esc(d.description||'')}${crName?' <span class="tag">'+esc(crName)+'</span>':' <span class="tag">Tous sites</span>'}</p></div>
        <div class="doc-a">
          ${fill?`<button class="iconbtn" title="Remplir" onclick="openFill('${d.id}')"><i class="ti ti-pencil"></i></button>
                  <button class="iconbtn" title="Réponses" onclick="openReps('${d.id}')"><i class="ti ti-list"></i></button>`
                :(d.fichier_url?`<a class="iconbtn" title="Télécharger" href="${esc(d.fichier_url)}" target="_blank" rel="noopener"><i class="ti ti-download"></i></a>`:'')}
          ${IS_ADMIN?`<button class="iconbtn" title="Modifier" onclick="openDoc('${d.id}')"><i class="ti ti-edit"></i></button>
          <button class="iconbtn d" title="Supprimer" onclick="delDoc('${d.id}')"><i class="ti ti-trash"></i></button>`:''}
        </div></div>`;
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
}

/* ---------- CATEGORIE ---------- */
function openCat(){document.getElementById('cNom').value='';document.getElementById('ovCat').classList.add('on');}
async function saveCat(){
  const nom=document.getElementById('cNom').value.trim();
  if(!nom)return toast('Nom requis');
  const{error}=await sb.from('doc_categories').insert({nom,couleur:document.getElementById('cCoul').value,ordre:CATS.length+1});
  if(error)return toast('Erreur : '+error.message);
  close_('ovCat');toast('Catégorie créée');loadAll();
}

/* ---------- DOCUMENT ---------- */
function toggleType(){
  const t=document.getElementById('dType').value;
  document.getElementById('fFile').style.display=t==='telechargeable'?'':'none';
  document.getElementById('fSchema').style.display=t==='remplissable'?'':'none';
}
function addChamp(lab,typ){
  const d=document.createElement('div');d.className='chip';
  d.innerHTML=`<input placeholder="Libellé du champ" value="${esc(lab||'')}">
    <select><option value="text">Texte</option><option value="textarea">Zone de texte</option>
    <option value="number">Nombre</option><option value="date">Date</option><option value="checkbox">Case à cocher</option></select>
    <button class="iconbtn d" onclick="this.parentNode.remove()"><i class="ti ti-x"></i></button>`;
  if(typ)d.querySelector('select').value=typ;
  document.getElementById('champs').appendChild(d);
}
function openDoc(id){
  editDocId=id||null;
  document.getElementById('docTitle').textContent=id?'Modifier le document':'Nouveau document';
  document.getElementById('dCat').innerHTML='<option value="">— Aucune —</option>'+CATS.map(c=>`<option value="${c.id}">${esc(c.nom)}</option>`).join('');
  const allowAll=!PROF||PROF.role==='direction';
  document.getElementById('dCreche').innerHTML=(allowAll?'<option value="">Toutes les crèches</option>':'')+CRECHES.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  document.getElementById('champs').innerHTML='';
  document.getElementById('dFile').value='';
  document.getElementById('dFileCur').textContent='';
  if(id){
    const d=DOCS.find(x=>x.id===id);
    document.getElementById('dTitre').value=d.titre||'';
    document.getElementById('dDesc').value=d.description||'';
    document.getElementById('dCat').value=d.categorie_id||'';
    document.getElementById('dCreche').value=d.creche_id||'';
    document.getElementById('dType').value=d.type;
    if(d.fichier_nom)document.getElementById('dFileCur').textContent='Fichier actuel : '+d.fichier_nom;
    (d.schema_champs||[]).forEach(c=>addChamp(c.label,c.type));
  }else{
    document.getElementById('dTitre').value='';
    document.getElementById('dDesc').value='';
    document.getElementById('dType').value='telechargeable';
    if(PROF&&PROF.role==='referent'&&PROF.creche_id)document.getElementById('dCreche').value=PROF.creche_id;
  }
  toggleType();
  document.getElementById('ovDoc').classList.add('on');
}

async function openFill(id,repId,forceNew){
  fillDoc=DOCS.find(d=>d.id===id);fillRep=null;
  let vals={};
  if(repId){
    const{data}=await sb.from('documents_reponses').select('*').eq('id',repId).maybeSingle();
    if(data){fillRep=data;vals=data.donnees||{};}
  }else if(!forceNew){
    /* reprend la derniere reponse de l'utilisateur pour ce document */
    const{data}=await sb.from('documents_reponses').select('*')
      .eq('document_id',id).eq('rempli_par',ME.id)
      .order('updated_at',{ascending:false}).limit(1);
    if(data&&data.length){fillRep=data[0];vals=data[0].donnees||{};}
  }
  document.getElementById('fillTitle').textContent=fillDoc.titre;

  /* --- Template dédié --- */
  const tpl=TPL[fillDoc.template_key];
  if(tpl){
    Object.keys(SIGS).forEach(k=>delete SIGS[k]);
    if(vals._sigs)Object.assign(SIGS,vals._sigs);
    const v={};tpl.fields.forEach(f=>v[f]=vals[f]!=null?vals[f]:'');
    document.getElementById('fillArea').innerHTML=tpl.html(v);
    document.getElementById('fillState').textContent=fillRep
      ? 'Reprise de la saisie du '+new Date(fillRep.updated_at||fillRep.created_at).toLocaleString('fr-FR')
      : 'Nouvelle saisie';
    ['responsable','salarie'].forEach(mountSig);
    close_('ovReps');
    document.getElementById('ovFill').classList.add('on');
    return;
  }

  document.getElementById('fillArea').innerHTML=(fillDoc.schema_champs||[]).map(c=>{
    const v=vals[c.key]!=null?vals[c.key]:'';
    let inp;
    if(c.type==='textarea')inp=`<textarea id="ff_${c.key}" rows="3">${esc(v)}</textarea>`;
    else if(c.type==='checkbox')inp=`<input type="checkbox" id="ff_${c.key}" ${v?'checked':''} style="width:auto">`;
    else inp=`<input type="${c.type}" id="ff_${c.key}" value="${esc(v)}">`;
    return `<div class="f"><label>${esc(c.label)}</label>${inp}</div>`;
  }).join('')||'<p style="color:var(--muted);font-size:13px">Ce document n\'a pas encore de champs configurés.</p>';
  close_('ovReps');
  document.getElementById('ovFill').classList.add('on');
}
async function saveFill(){
 try{
  const donnees={};
  const tpl=TPL[fillDoc.template_key];
  if(tpl){
    tpl.fields.forEach(f=>{
      if(f==='fonction'){
        const r=document.querySelector('input[name=ff_fonction]:checked');
        donnees.fonction=r?r.value:'';return;
      }
      if(/^rt_(ref|coo)_s\d+i\d+$/.test(f)){
        const r=document.querySelector('input[name=ff_'+f+']:checked');
        donnees[f]=r?r.value:'';return;
      }
      if(/^gev_(sal|ref)_/.test(f)){
        const r=document.querySelector('input[name=ff_'+f+']:checked');
        donnees[f]=r?r.value:'';return;
      }
      const el=document.getElementById('ff_'+f);
      if(el)donnees[f]=el.value;
    });
    donnees._sigs=Object.assign({},SIGS);
  }
  (tpl?[]:(fillDoc.schema_champs||[])).forEach(c=>{
    const el=document.getElementById('ff_'+c.key);
    if(!el)return;
    donnees[c.key]=c.type==='checkbox'?el.checked:el.value;
  });
  const row={
    document_id:fillDoc.id,
    creche_id:fillDoc.creche_id||(PROF?PROF.creche_id:null),
    donnees,rempli_par:ME.id,
    rempli_par_nom:PROF?PROF.name:null,
    updated_at:new Date().toISOString()
  };
  let error;
  if(fillRep){({error}=await sb.from('documents_reponses').update(row).eq('id',fillRep.id));}
  else{
    const{data,error:ie}=await sb.from('documents_reponses').insert(row).select().maybeSingle();
    error=ie;
    if(data)fillRep=data;          /* evite les doublons aux enregistrements suivants */
  }
  if(error)return toast('Erreur : '+(error.message||'enregistrement impossible'));
  toast('Enregistré');
  close_('ovFill');
 }catch(e){
  console.error('saveFill',e);
  toast('Erreur : '+(e&&e.message?e.message:'inattendue'));
 }
}

function sigBoxHtml(role,label){
  return `<div class="sigbox" id="sb_${role}">
    <div class="lbl">${esc(label)}</div>
    <div id="sbc_${role}"></div>
    <div class="acts">
      <button class="btn btn-g" onclick="clearSig('${role}')"><i class="ti ti-eraser"></i> Effacer</button>
      <button class="btn btn-s" data-role="${esc(role)}" data-label="${esc(label)}" onclick="startQr(this.dataset.role,this.dataset.label)"><i class="ti ti-qrcode"></i> Signer sur mobile</button>
    </div></div>`;
}

function mountSig(role){
  const host=document.getElementById('sbc_'+role);
  if(!host)return;
  if(SIGS[role]){host.innerHTML=`<img src="${SIGS[role]}" alt="signature">`;return;}
  host.innerHTML='<canvas></canvas>';
  const c=host.querySelector('canvas');
  const r=c.getBoundingClientRect();
  c.width=Math.max(300,r.width)*2;c.height=120*2;
  const ctx=c.getContext('2d');ctx.scale(2,2);
  ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#2B2740';
  let on=false;
  const pt=e=>{const b=c.getBoundingClientRect();const p=e.touches?e.touches[0]:e;
    return[(p.clientX-b.left)*(c.width/2/b.width),(p.clientY-b.top)*(c.height/2/b.height)];};
  const dn=e=>{e.preventDefault();on=true;ctx.beginPath();ctx.moveTo(...pt(e));};
  const mv=e=>{if(!on)return;e.preventDefault();ctx.lineTo(...pt(e));ctx.stroke();};
  const up=()=>{if(!on)return;on=false;SIGS[role]=c.toDataURL('image/png');};
  c.addEventListener('mousedown',dn);c.addEventListener('mousemove',mv);
  window.addEventListener('mouseup',up);
  c.addEventListener('touchstart',dn,{passive:false});
  c.addEventListener('touchmove',mv,{passive:false});
  c.addEventListener('touchend',up);
}
function clearSig(role){delete SIGS[role];mountSig(role);}

/* ---------- QR SIGNATURE A DISTANCE ---------- */
function mkToken(){
  const a=new Uint8Array(24);crypto.getRandomValues(a);
  return [...a].map(b=>b.toString(36).padStart(2,'0')).join('').slice(0,32);
}
async function startQr(role,label){
  const nom=(document.getElementById('ff_sal_nom')||{}).value||'';
  qrToken=mkToken();
  const{error}=await sb.from('signatures_pending').insert({
    token:qrToken,document_id:fillDoc.id,reponse_id:fillRep?fillRep.id:null,
    role_sign:role,signataire:(role==='salarie'?nom:((PROF&&PROF.name)||''))||'Signataire',
    contexte:fillDoc.titre+(nom?' — '+nom:''),created_by:ME.id
  });
  if(error){qrToken=null;return toast('Erreur : '+error.message);}
  const url=location.origin+location.pathname.replace(/[^/]*$/,'')+'signature.html?t='+qrToken;
  document.getElementById('qrTitle').textContent=label;
  const box=document.getElementById('qrBox');box.innerHTML='';
  QR_URL=url;
  let done=false;
  if(typeof QRCode==='function'){
    try{new QRCode(box,{text:url,width:220,height:220,correctLevel:QRCode.CorrectLevel.M});done=true;}
    catch(e){console.warn('QRCode lib KO',e);}
  }
  if(!done){
    const img=document.createElement('img');
    img.width=220;img.height=220;img.alt='QR';
    img.src='https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(url);
    box.appendChild(img);
  }
  const link=document.createElement('div');
  link.style.cssText='margin-top:12px;font-size:11px;word-break:break-all;color:var(--muted);line-height:1.4';
  link.textContent=url;
  box.appendChild(link);
  const cp=document.createElement('button');
  cp.className='btn btn-s';cp.style.marginTop='8px';
  cp.innerHTML='<i class="ti ti-copy"></i> Copier le lien';
  cp.onclick=()=>{navigator.clipboard.writeText(QR_URL).then(()=>toast('Lien copié'),()=>toast('Copie impossible'));};
  box.appendChild(cp);
  document.getElementById('qrWait').textContent='En attente de la signature… (lien valable 30 min)';
  document.getElementById('ovQr').classList.add('on');
  qrTimer=setInterval(()=>pollQr(role),3000);
}
async function pollQr(role){
  if(!qrToken)return;
  const{data}=await sb.from('signatures_pending').select('signature_data,signed_at')
    .eq('token',qrToken).maybeSingle();   /* lecture authentifiee : policy sigpend_auth_all */
  if(data&&data.signature_data){
    SIGS[role]=data.signature_data;
    stopQr();mountSig(role);toast('Signature reçue');
  }
}
function stopQr(){
  if(qrTimer)clearInterval(qrTimer);
  qrTimer=null;qrToken=null;
  document.getElementById('ovQr').classList.remove('on');
}
function cancelQr(){
  if(qrToken)sb.from('signatures_pending').delete().eq('token',qrToken);
  stopQr();
}

async function delRep(rid,did){
  if(!confirm('Supprimer cette réponse ?'))return;
  await sb.from('documents_reponses').delete().eq('id',rid);
  openReps(did);
}

document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('on');}));
document.getElementById('liPwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
boot();
</script>
