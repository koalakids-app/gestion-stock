name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 * * 1,4'  # Lundi et jeudi à 8h UTC
  workflow_dispatch:        # Permet de lancer manuellement depuis GitHub

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase DB
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://juyrceadazrovlitxceb.supabase.co/rest/v1/articles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Ping failed with status $STATUS"
            exit 1
          fi
          echo "Supabase is alive ✓"
